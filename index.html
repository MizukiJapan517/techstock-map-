<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSTOCK Knowledge Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --bg-surface: #f2f1ed;
  --text: #1a1a18;
  --text-muted: #888780;
  --text-hint: #b4b2a9;
  --border: rgba(0,0,0,0.08);
  --accent: #534AB7;
  --font-body: 'Noto Sans JP', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --radius: 10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141413;
    --bg-surface: #1e1e1c;
    --text: #e8e6df;
    --text-muted: #888780;
    --text-hint: #5f5e5a;
    --border: rgba(255,255,255,0.06);
    --accent: #AFA9EC;
  }
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
}
main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding: 20px 24px 16px;
  gap: 16px;
}
.title-bar {
  display: flex;
  align-items: baseline;
  gap: 16px;
  flex-shrink: 0;
}
.title-bar h1 {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.title-accent { color: var(--accent); }
.subtitle {
  font-size: 12px;
  color: var(--text-hint);
  font-weight: 300;
}
.graph-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}
.graph-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.graph-meta {
  display: flex;
  align-items: center;
  gap: 12px;
}
.page-count {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  background: var(--bg-surface);
  padding: 4px 10px;
  border-radius: var(--radius);
}
.fetch-time {
  font-size: 11px;
  color: var(--text-hint);
}
.filter-buttons { display: flex; gap: 4px; }
.filter-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover {
  background: var(--bg-surface);
  color: var(--text);
}
.filter-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.graph-container {
  flex: 1;
  position: relative;
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  background: var(--bg-surface);
  overflow: hidden;
  min-height: 0;
}
.graph-container svg {
  width: 100%;
  height: 100%;
  display: block;
}
.graph-tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  max-width: 260px;
  z-index: 100;
  display: none;
}
.legend {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.legend-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.legend-hint {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-hint);
  font-family: var(--font-mono);
}
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  height: 100%;
  color: var(--text-muted);
  font-size: 13px;
}
.loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg {
  color: #E24B4A;
  font-size: 13px;
  text-align: center;
  padding: 40px;
}
@media (max-width: 640px) {
  main { padding: 14px 16px 12px; }
  .title-bar { flex-direction: column; gap: 4px; }
  .graph-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .filter-buttons { flex-wrap: wrap; }
  .legend-hint { display: none; }
}
</style>
</head>
<body>
<main>
  <div class="title-bar">
    <h1><span class="title-accent">TECHSTOCK</span> Knowledge Map</h1>
    <p class="subtitle">Cosense のページ構造をリアルタイムに可視化</p>
  </div>

  <div class="graph-wrapper">
    <div class="graph-header">
      <div class="graph-meta">
        <span class="page-count" id="page-count">—</span>
        <span class="fetch-time" id="fetch-time"></span>
      </div>
      <div class="filter-buttons" id="filter-buttons"></div>
    </div>

    <div class="graph-container" id="graph-container">
      <svg id="graph"></svg>
      <div class="graph-tooltip" id="tooltip"></div>
    </div>

    <div class="legend" id="legend"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// ============================================================
// 設定
// ============================================================
const PROJECT = "TECHSTOCK";
const API_URL = `https://scrapbox.io/api/pages/${PROJECT}?limit=1000`;

const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

// カテゴリ色
const COLORS = {
  hub:      isDark ? "#AFA9EC" : "#534AB7",
  MV:       isDark ? "#85B7EB" : "#378ADD",
  CM:       isDark ? "#85B7EB" : "#378ADD",
  "OP/ED":  isDark ? "#85B7EB" : "#378ADD",
  映画:     isDark ? "#AFA9EC" : "#534AB7",
  デザイン:  isDark ? "#ED93B1" : "#D4537E",
  映像技法:  isDark ? "#5DCAA5" : "#1D9E75",
  表現様式:  isDark ? "#F0997B" : "#D85A30",
  音楽:     isDark ? "#FAC775" : "#BA7517",
  ゲーム:   isDark ? "#97C459" : "#639922",
  年代:     isDark ? "#B4B2A9" : "#888780",
  other:    isDark ? "#B4B2A9" : "#888780",
};

const LINK_COLOR = isDark ? "rgba(180,178,169,0.1)" : "rgba(136,135,128,0.08)";
const LINK_HIGHLIGHT = isDark ? "rgba(180,178,169,0.5)" : "rgba(136,135,128,0.4)";
const TEXT_COLOR = isDark ? "#e8e6df" : "#2c2c2a";

// ハブとして扱うページ
const HUB_TITLES = new Set([
  "MV","CM","映画","デザイン","映像技法","表現様式",
  "OP/ED","音楽ジャンル","ゲーム","年代","後で書く"
]);

// フィルターボタン
const FILTERS = [
  { key: "all", label: "All" },
  { key: "MV", label: "MV" },
  { key: "デザイン", label: "Design" },
  { key: "映像技法", label: "映像技法" },
  { key: "表現様式", label: "表現様式" },
  { key: "音楽", label: "音楽" },
  { key: "映画", label: "映画" },
];

// 凡例
const LEGEND = [
  { label: "Hub", color: "#534AB7" },
  { label: "映像技法", color: "#1D9E75" },
  { label: "表現様式", color: "#D85A30" },
  { label: "MV / CM", color: "#378ADD" },
  { label: "デザイン", color: "#D4537E" },
  { label: "音楽", color: "#BA7517" },
  { label: "Other", color: "#888780" },
];

// ============================================================
// カテゴリ判定
// ============================================================
function categorize(page) {
  const patterns = [
    [/^#?mv$/i, "MV"], [/^#?cm$/i, "CM"],
    [/^#?映画$/i, "映画"], [/^#?デザイン$/i, "デザイン"],
    [/^#?映像技法$/i, "映像技法"], [/^#?表現様式$/i, "表現様式"],
    [/^#?op\/ed$/i, "OP/ED"], [/^#?ゲーム$/i, "ゲーム"],
    [/^#?音楽ジャンル$|^#?音楽$/i, "音楽"], [/^#?年代$/i, "年代"],
    [/^#?タイポグラフィ$/i, "デザイン"], [/^#?web$/i, "デザイン"],
    [/^#?アニメーション$/i, "映画"],
  ];
  // リンク先にカテゴリがあるか
  for (const link of (page.links || [])) {
    for (const [re, cat] of patterns) {
      if (re.test(link)) return cat;
    }
  }
  // descriptionsのタグ
  for (const line of (page.descriptions || [])) {
    for (const [re, cat] of patterns) {
      if (re.test(line.trim())) return cat;
    }
  }
  // タイトルそのもの
  for (const [re, cat] of patterns) {
    if (re.test(page.title)) return cat;
  }
  return "other";
}

// ============================================================
// データ取得 → グラフ構築
// ============================================================
async function fetchAndBuild() {
  const container = document.getElementById("graph-container");

  // ローディング表示
  container.innerHTML = `
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <p>Cosense からデータを取得中...</p>
    </div>`;

  let data;
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch (e) {
    container.innerHTML = `<div class="error-msg">データの取得に失敗しました。<br>TECHSTOCKプロジェクトがpublicか確認してください。</div>`;
    return;
  }

  // ローディング消してSVGを入れ直す
  container.innerHTML = `<svg id="graph"></svg><div class="graph-tooltip" id="tooltip"></div>`;

  const pages = data.pages;
  const allTitles = new Set(pages.map(p => p.title));

  // ノード
  const nodes = pages.map(p => ({
    id: p.title,
    links: p.linked || 0,
    category: categorize(p),
    isHub: HUB_TITLES.has(p.title) || (p.linked || 0) >= 8,
    views: p.views || 0,
  }));

  // リンク（重複除去）
  const linkSet = new Set();
  const links = [];
  for (const p of pages) {
    for (const target of (p.links || [])) {
      if (allTitles.has(target)) {
        const key = [p.title, target].sort().join("|||");
        if (!linkSet.has(key)) {
          linkSet.add(key);
          links.push({ source: p.title, target });
        }
      }
    }
  }

  // メタ情報表示
  document.getElementById("page-count").textContent = data.count + " pages";
  const now = new Date();
  document.getElementById("fetch-time").textContent =
    now.toLocaleString("ja-JP", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" }) + " に取得";

  // グラフ描画
  drawGraph(container, nodes, links);
}

// ============================================================
// D3 描画
// ============================================================
function drawGraph(container, nodes, links) {
  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select("#graph").attr("viewBox", `0 0 ${width} ${height}`);
  const g = svg.append("g");

  // ズーム
  svg.call(
    d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform))
  );

  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  function getRadius(d) {
    if (d.isHub) return Math.max(14, Math.min(30, 10 + d.links));
    return Math.max(3, Math.min(10, 2 + d.links * 1.5));
  }
  function getColor(d) {
    if (d.isHub) return COLORS.hub;
    return COLORS[d.category] || COLORS.other;
  }

  // シミュレーション
  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
      const s = nodeMap.get(d.source.id || d.source);
      const t = nodeMap.get(d.target.id || d.target);
      return (s && s.isHub) || (t && t.isHub) ? 90 : 50;
    }))
    .force("charge", d3.forceManyBody().strength(d => d.isHub ? -400 : -60))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => getRadius(d) + 3));

  // リンク
  const linkEls = g.append("g").selectAll("line")
    .data(links).join("line")
    .attr("stroke", LINK_COLOR).attr("stroke-width", 0.5);

  // ノード
  const nodeEls = g.append("g").selectAll("g")
    .data(nodes).join("g")
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  nodeEls.append("circle")
    .attr("r", getRadius)
    .attr("fill", getColor)
    .attr("stroke", getColor)
    .attr("stroke-width", d => d.isHub ? 2 : 0.5)
    .attr("fill-opacity", d => d.isHub ? 0.15 : 0.6)
    .attr("stroke-opacity", 0.8);

  // ハブラベル
  nodeEls.filter(d => d.isHub).append("text")
    .text(d => d.id)
    .attr("text-anchor", "middle").attr("dy", "0.35em")
    .attr("font-size", "11px").attr("font-weight", "500")
    .attr("fill", TEXT_COLOR).attr("pointer-events", "none");

  // ホバー
  const tooltip = document.getElementById("tooltip");

  nodeEls.on("mouseover", function(e, d) {
    const connected = new Set();
    links.forEach(l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      if (sid === d.id) connected.add(tid);
      if (tid === d.id) connected.add(sid);
    });
    nodeEls.select("circle").attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.08);
    nodeEls.selectAll("text").attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.08);
    linkEls.attr("stroke", l => {
      const sid = l.source.id, tid = l.target.id;
      return (sid === d.id || tid === d.id) ? LINK_HIGHLIGHT : "transparent";
    }).attr("stroke-width", l => {
      const sid = l.source.id, tid = l.target.id;
      return (sid === d.id || tid === d.id) ? 1.5 : 0.5;
    });
    const connList = [...connected].slice(0, 6).join(", ");
    tooltip.innerHTML = `<strong>${d.id}</strong><span style="opacity:0.6;margin-left:6px">${d.links} links</span>`
      + `<div style="font-size:11px;opacity:0.5;margin-top:4px">${connected.size > 0 ? connList + (connected.size > 6 ? " ..." : "") : "no connections"}</div>`;
    tooltip.style.display = "block";
  })
  .on("mousemove", function(e) {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 14) + "px";
    tooltip.style.top = (e.clientY - rect.top - 10) + "px";
  })
  .on("mouseout", function() {
    nodeEls.select("circle").attr("opacity", 1);
    nodeEls.selectAll("text").attr("opacity", d => d.isHub ? 1 : 0);
    linkEls.attr("stroke", LINK_COLOR).attr("stroke-width", 0.5);
    tooltip.style.display = "none";
  })
  .on("click", function(e, d) {
    window.open(`https://scrapbox.io/${PROJECT}/${encodeURIComponent(d.id)}`, "_blank");
  });

  // tick
  simulation.on("tick", () => {
    linkEls
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeEls.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // フィルター関数をグローバルに登録
  window._graphState = { nodes, nodeEls, linkEls };
}

// ============================================================
// フィルタリング（グローバル）
// ============================================================
function applyFilter(key) {
  const state = window._graphState;
  if (!state) return; // データ未読み込みの場合は何もしない

  const { nodes, nodeEls, linkEls } = state;

  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  const target = document.querySelector(`[data-filter="${key}"]`);
  if (target) target.classList.add("active");

  if (key === "all") {
    nodeEls.select("circle").attr("opacity", 1);
    nodeEls.selectAll("text").attr("opacity", d => d.isHub ? 1 : 0);
    linkEls.attr("stroke", LINK_COLOR).attr("stroke-opacity", 1);
    return;
  }

  const matching = new Set();
  nodes.forEach(n => {
    if (n.category === key || n.id === key
      || (key === "MV" && (n.category === "MV" || n.category === "CM" || n.category === "OP/ED"))) {
      matching.add(n.id);
    }
  });
  nodeEls.select("circle").attr("opacity", d => matching.has(d.id) ? 1 : 0.05);
  nodeEls.selectAll("text").attr("opacity", d => matching.has(d.id) ? 1 : 0.05);
  linkEls.attr("stroke", l => {
    return matching.has(l.source.id) && matching.has(l.target.id) ? LINK_HIGHLIGHT : "transparent";
  });
}

// ============================================================
// UI 初期化
// ============================================================
function initUI() {
  // フィルターボタン
  const btnContainer = document.getElementById("filter-buttons");
  FILTERS.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (f.key === "all" ? " active" : "");
    btn.dataset.filter = f.key;
    btn.textContent = f.label;
    btn.onclick = () => applyFilter(f.key);
    btnContainer.appendChild(btn);
  });

  // 凡例
  const legendContainer = document.getElementById("legend");
  LEGEND.forEach(item => {
    const div = document.createElement("div");
    div.className = "legend-item";
    div.innerHTML = `<div class="legend-dot" style="background:${item.color}"></div>${item.label}`;
    legendContainer.appendChild(div);
  });
  const hint = document.createElement("div");
  hint.className = "legend-hint";
  hint.textContent = "click node → open in Cosense";
  legendContainer.appendChild(hint);
}

// 起動
initUI();
fetchAndBuild();
</script>
</body>
</html>
